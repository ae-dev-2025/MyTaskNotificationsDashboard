<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Task &amp; Notifications Dashboard</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="TaskDashboard.styles.css" />
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script>
        // Small helpers invoked from Blazor via IJSRuntime.
        window.taskDashboard = {
            scrollTo: function (element, top) {
                if (element) {
                    element.scrollTop = top;
                }
            },

            // Applies "system" | "light" | "dark". Bootstrap 5.3 switches on
            // the data-bs-theme attribute; "system" resolves via the OS
            // preference and follows it live.
            applyTheme: function (pref) {
                var media = window.matchMedia('(prefers-color-scheme: dark)');
                var apply = function () {
                    var effective = pref === 'system' ? (media.matches ? 'dark' : 'light') : pref;
                    document.documentElement.setAttribute('data-bs-theme', effective);
                };
                if (window.taskDashboard._themeListener) {
                    media.removeEventListener('change', window.taskDashboard._themeListener);
                    window.taskDashboard._themeListener = null;
                }
                if (pref === 'system') {
                    window.taskDashboard._themeListener = apply;
                    media.addEventListener('change', apply);
                }
                apply();
            }
        };
    </script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
