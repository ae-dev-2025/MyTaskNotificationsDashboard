<!doctype html><html><head><meta charset="utf-8"><title>Stat tiles</title>
<style>
body{font-family:'Helvetica Neue',Arial,sans-serif;margin:0}
.theme{padding:1rem;display:flex;gap:.75rem}
.light{background:#f6f7f8}.dark{background:#16191d}
.tile{border-radius:.5rem;padding:.75rem 1rem;display:flex;flex-direction:column;gap:.15rem;min-width:7rem}
.light .tile{background:#fff;border:1px solid #dee2e6}
.dark .tile{background:#22262b;border:1px solid #3a4148}
.v{font-size:1.5rem;font-weight:700}.l{font-size:.8rem}
.light .v{color:#212529}.light .l{color:#6c757d}
.dark .v{color:#e9ecef}.dark .l{color:#a2acb5}
.light .alert{border-color:#f1aeb5;background:#fdf2f3}.light .alert .v{color:#b02a37}
.dark .alert{border-color:#6e2a31;background:#33191d}.dark .alert .v{color:#e4606d}
</style></head><body>
<div class="theme light">
<div class="tile"><span class="v">3</span><span class="l">tasks left</span></div>
<div class="tile"><span class="v">2h</span><span class="l">estimated</span></div>
<div class="tile alert"><span class="v">1</span><span class="l">overdue</span></div>
<div class="tile"><span class="v">×1.4</span><span class="l">estimate accuracy</span></div>
</div>
<div class="theme dark">
<div class="tile"><span class="v">3</span><span class="l">tasks left</span></div>
<div class="tile"><span class="v">2h</span><span class="l">estimated</span></div>
<div class="tile alert"><span class="v">1</span><span class="l">overdue</span></div>
<div class="tile"><span class="v">×1.4</span><span class="l">estimate accuracy</span></div>
</div>
</body></html>
