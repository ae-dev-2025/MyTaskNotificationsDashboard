<!-- @dsCard group="Panels" -->
<!doctype html><html><head><meta charset="utf-8"><title>Now panel</title>
<style>
body{font-family:'Helvetica Neue',Arial,sans-serif;margin:0;display:flex}
.theme{flex:1;padding:1rem}
.light{background:#f6f7f8}.dark{background:#16191d}
.panel{border-radius:.5rem;padding:1rem 1.1rem;border-left-width:4px;border-left-style:solid}
.light .panel{background:#fff;border:1px solid #dee2e6;border-left:4px solid #1b6ec2}
.dark .panel{background:#22262b;border:1px solid #3a4148;border-left:4px solid #4d9fe8}
h2{font-size:.85rem;text-transform:uppercase;letter-spacing:.06em;margin:0 0 .75rem}
.light h2{color:#868e96}.dark h2{color:#8a939c}
.row{display:flex;flex-wrap:wrap;align-items:baseline;gap:.5rem}
.badge{padding:.35em .65em;font-size:.7em;font-weight:600;border-radius:.375rem}
.light .badge{background:#fde5cc;color:#8a4b08}.dark .badge{background:#4c3010;color:#f3c088}
.title{font-size:1.15rem;font-weight:600}
.light .title{color:#212529}.dark .title{color:#e9ecef}
.time{font-size:.9rem}.light .time{color:#6c757d}.dark .time{color:#a2acb5}
.actions{display:flex;gap:.5rem;margin-top:.75rem}
.btn{font-size:.8rem;padding:.25rem .6rem;border-radius:.375rem;border:1px solid transparent;font-weight:500}
.primary{background:#1b6ec2;color:#fff}
.light .ghost{background:transparent;border-color:#6c757d;color:#6c757d}
.dark .ghost{background:transparent;border-color:#a2acb5;color:#a2acb5}
</style></head><body>
<div class="theme light"><div class="panel"><h2>Now</h2>
<div class="row"><span class="badge">High</span><span class="title">Write the report</span>
<span class="time">started 09:15 · 23m in · ~37m left</span></div>
<div class="actions"><button class="btn primary">Done</button><button class="btn ghost">Stop</button></div>
</div></div>
<div class="theme dark"><div class="panel"><h2>Now</h2>
<div class="row"><span class="badge">High</span><span class="title">Write the report</span>
<span class="time">started 09:15 · 23m in · ~37m left</span></div>
<div class="actions"><button class="btn primary">Done</button><button class="btn ghost">Stop</button></div>
</div></div>
</body></html>
