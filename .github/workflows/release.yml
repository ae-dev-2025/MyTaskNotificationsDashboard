name: Release builds

# Every merge to main publishes a GitHub Release with installable builds:
# a Windows x64 zip and a signed Android APK. Pull requests run the same
# build as validation — artifacts are attached to the run, but a public
# Release is only created from main.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install MAUI workloads
        run: dotnet workload install maui-windows android

      - name: Publish Windows (Release, win-x64)
        run: dotnet publish TaskDashboard/TaskDashboard.csproj -f net10.0-windows10.0.19041.0 -c Release

      - name: Zip Windows build
        shell: pwsh
        run: |
          $pub = Get-ChildItem TaskDashboard/bin/Release/net10.0-windows10.0.19041.0 -Recurse -Directory -Filter publish | Select-Object -First 1
          Compress-Archive -Path "$($pub.FullName)\*" -DestinationPath TaskDashboard-windows-x64.zip
          Write-Output "zip: $([Math]::Round((Get-Item TaskDashboard-windows-x64.zip).Length / 1MB, 1)) MB"

      - name: Restore signing keystore from secrets
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\taskdashboard.keystore",
            [Convert]::FromBase64String($env:KEYSTORE_B64))
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}

      - name: Publish Android (Release, signed APK)
        shell: pwsh
        run: |
          dotnet publish TaskDashboard/TaskDashboard.csproj -f net10.0-android -c Release `
            -p:AndroidPackageFormats=apk `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore="$env:RUNNER_TEMP\taskdashboard.keystore" `
            -p:AndroidSigningKeyAlias=taskdashboard `
            -p:AndroidSigningStorePass=env:ANDROID_SIGNING_PASSWORD `
            -p:AndroidSigningKeyPass=env:ANDROID_SIGNING_PASSWORD `
            -p:ApplicationVersion=${{ github.run_number }} `
            -p:ApplicationDisplayVersion=1.0.${{ github.run_number }}
        env:
          ANDROID_SIGNING_PASSWORD: ${{ secrets.ANDROID_SIGNING_PASSWORD }}

      - name: Collect APK
        shell: pwsh
        run: |
          $apk = Get-ChildItem TaskDashboard/bin/Release/net10.0-android -Recurse -Filter '*-Signed.apk' | Select-Object -First 1
          Copy-Item $apk.FullName TaskDashboard-android.apk
          Write-Output "apk: $([Math]::Round((Get-Item TaskDashboard-android.apk).Length / 1MB, 1)) MB"

      # Artifacts on every run (including branch validation runs) …
      - uses: actions/upload-artifact@v4
        with:
          name: TaskDashboard-windows-x64
          path: TaskDashboard-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: TaskDashboard-android
          path: TaskDashboard-android.apk

      # … but a public Release only from main.
      - name: Create GitHub release (main only)
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          gh release create "v1.0.${{ github.run_number }}" `
            TaskDashboard-windows-x64.zip TaskDashboard-android.apk `
            --title "Task Dashboard 1.0.${{ github.run_number }}" `
            --notes "Automated build from ${{ github.sha }}. Windows: unzip and run TaskDashboard.exe. Android: install the APK (requires allowing installs from unknown sources)." `
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
