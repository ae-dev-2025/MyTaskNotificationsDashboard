name: Release builds

# Every merge to main publishes a GitHub Release with installable builds:
# a Windows x64 zip and a signed Android APK. Pull requests run the same
# build as validation — artifacts are attached to the run, but a public
# Release is only created from main.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install MAUI workloads
        run: dotnet workload install maui-windows android

      # Self-contained on both axes (.NET runtime and Windows App SDK), so the
      # zip genuinely is "unzip and run" on a machine with neither installed --
      # which includes the hosted runner the demo job runs it on. Without
      # WindowsAppSDKSelfContained the exe exits at startup when the runtime
      # is missing, before any window or WebView exists.
      - name: Publish Windows (Release, win-x64, self-contained)
        run: dotnet publish TaskDashboard/TaskDashboard.csproj -f net10.0-windows10.0.19041.0 -c Release -p:SelfContained=true -p:WindowsAppSDKSelfContained=true

      - name: Zip Windows build
        shell: pwsh
        run: |
          $pub = Get-ChildItem TaskDashboard/bin/Release/net10.0-windows10.0.19041.0 -Recurse -Directory -Filter publish | Select-Object -First 1
          Compress-Archive -Path "$($pub.FullName)\*" -DestinationPath TaskDashboard-windows-x64.zip
          Write-Output "zip: $([Math]::Round((Get-Item TaskDashboard-windows-x64.zip).Length / 1MB, 1)) MB"

      - name: Restore signing keystore from secrets
        shell: pwsh
        run: |
          # Strip any whitespace the secret may have picked up in transit —
          # a stray newline must not break the decode.
          $b64 = $env:KEYSTORE_B64 -replace '\s', ''
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\taskdashboard.keystore",
            [Convert]::FromBase64String($b64))
          Write-Output "keystore: $((Get-Item "$env:RUNNER_TEMP\taskdashboard.keystore").Length) bytes"
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}

      - name: Publish Android (Release, signed APK)
        shell: pwsh
        run: |
          dotnet publish TaskDashboard/TaskDashboard.csproj -f net10.0-android -c Release `
            -p:AndroidPackageFormats=apk `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore="$env:RUNNER_TEMP\taskdashboard.keystore" `
            -p:AndroidSigningKeyAlias=taskdashboard `
            -p:AndroidSigningStorePass=env:ANDROID_SIGNING_PASSWORD `
            -p:AndroidSigningKeyPass=env:ANDROID_SIGNING_PASSWORD `
            -p:ApplicationVersion=${{ github.run_number }} `
            -p:ApplicationDisplayVersion=1.0.${{ github.run_number }}
        env:
          ANDROID_SIGNING_PASSWORD: ${{ secrets.ANDROID_SIGNING_PASSWORD }}

      - name: Collect APK
        shell: pwsh
        run: |
          $apk = Get-ChildItem TaskDashboard/bin/Release/net10.0-android -Recurse -Filter '*-Signed.apk' | Select-Object -First 1
          Copy-Item $apk.FullName TaskDashboard-android.apk
          Write-Output "apk: $([Math]::Round((Get-Item TaskDashboard-android.apk).Length / 1MB, 1)) MB"

      # Artifacts on every run (including branch validation runs) …
      - uses: actions/upload-artifact@v4
        with:
          name: TaskDashboard-windows-x64
          path: TaskDashboard-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: TaskDashboard-android
          path: TaskDashboard-android.apk

      # … but a public Release only from main.
      - name: Create GitHub release (main only)
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          gh release create "v1.0.${{ github.run_number }}" `
            TaskDashboard-windows-x64.zip TaskDashboard-android.apk `
            --title "Task Dashboard 1.0.${{ github.run_number }}" `
            --notes "Automated build from ${{ github.sha }}. Windows: unzip and run TaskDashboard.exe. Android: install the APK (requires allowing installs from unknown sources)." `
            --latest
        env:
          GH_TOKEN: ${{ github.token }}

  # Every PR recreates the demo in docs/ from the freshly built app, so the
  # screenshots and tour can never drift from the code under review. The
  # refreshed files are committed back to the PR branch (a GITHUB_TOKEN push
  # does not retrigger workflows, so this cannot loop), and the single-file
  # tour is attached to the run for anyone who wants to demo without checkout.
  demo:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: build
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/download-artifact@v4
        with:
          name: TaskDashboard-windows-x64
          path: ${{ runner.temp }}

      - name: Unpack the built app
        shell: pwsh
        run: |
          Expand-Archive "$env:RUNNER_TEMP\TaskDashboard-windows-x64.zip" -DestinationPath "$env:RUNNER_TEMP\app"
          if (-not (Test-Path "$env:RUNNER_TEMP\app\TaskDashboard.exe")) { throw "TaskDashboard.exe not found in the zip" }

      - name: Recreate the demo
        shell: pwsh
        run: .\docs\capture.ps1 -ExePath "$env:RUNNER_TEMP\app\TaskDashboard.exe" -Embed

      - uses: actions/upload-artifact@v4
        with:
          name: TaskDashboard-demo-tour
          path: docs/tour.embed.html

      - name: Commit the refreshed demo to the PR branch
        shell: pwsh
        run: |
          git add docs
          if (-not (git status --porcelain docs)) {
            Write-Output "demo unchanged, nothing to commit"
            exit 0
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Recreate the demo from this PR's build [skip ci]"
          git push
